<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Simpsons Episode Recommender</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet" />
        <style>
            :root {
                --bg-1: #fff8cc;
                --bg-2: #dff4ff;
                --card: #ffffff;
                --ink: #1f2937;
                --muted: #475569;
                --accent: #ffbe0b;
                --border: #dbe3ec;
                --danger: #b91c1c;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: "Nunito", sans-serif;
                color: var(--ink);
                background:
                    radial-gradient(circle at 8% 10%, #ffe082 0%, transparent 36%),
                    radial-gradient(circle at 92% 12%, #b3e5ff 0%, transparent 32%),
                    linear-gradient(140deg, var(--bg-1), var(--bg-2));
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px 14px;
            }

            .panel {
                width: min(460px, 100%);
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 18px;
                box-shadow: 0 10px 24px rgba(15, 23, 42, 0.09);
            }

            h1 {
                margin: 0;
                font-family: "Bangers", cursive;
                font-size: clamp(2rem, 6vw, 2.6rem);
                letter-spacing: 1px;
                color: #1e3a8a;
            }

            .subtitle {
                margin: 6px 0 14px;
                font-size: 0.95rem;
                color: var(--muted);
            }

            .error {
                margin: 0 0 12px;
                padding: 8px 10px;
                border-radius: 10px;
                background: #fee2e2;
                color: var(--danger);
                font-weight: 700;
                font-size: 0.9rem;
            }

            label {
                display: block;
                font-weight: 700;
                font-size: 0.95rem;
            }

            input {
                width: 100%;
                margin-top: 6px;
                border: 1px solid #cbd5e1;
                border-radius: 10px;
                padding: 10px 11px;
                font-size: 0.95rem;
            }

            input:focus {
                outline: 2px solid #93c5fd;
                outline-offset: 1px;
            }

            .actions {
                margin-top: 14px;
                display: flex;
                justify-content: flex-end;
            }

            button {
                border: none;
                background: linear-gradient(130deg, var(--accent), #ffd86e);
                color: #0f172a;
                font-size: 1rem;
                font-weight: 800;
                padding: 10px 14px;
                border-radius: 11px;
                cursor: pointer;
                box-shadow: 0 6px 14px rgba(250, 204, 21, 0.35);
            }

            button:hover {
                filter: brightness(0.96);
            }
        </style>
	</head>

    <body>
        <form method="post" class="panel">
            <h1>Springfield Picks</h1>
            <p class="subtitle">Type your username and jump into episode recommendations.</p>
            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}
            <div>
                <label for="username">Username</label>
                <input id="username" type="text" name="username" minlength="3" maxlength="30" required />
            </div>
            <div class="actions">
                <button type="submit">Start</button>
            </div>
		</form>
	</body>
</html>
